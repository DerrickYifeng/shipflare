name: E2E (manual)

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Target URL (e.g. staging deployment)"
        required: true
        default: "https://staging.shipflare.com"

jobs:
  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @shipflare/e2e exec playwright install --with-deps chromium

      - name: Run Playwright smoke
        env:
          SHIPFLARE_URL: ${{ github.event.inputs.url }}
        run: pnpm --filter @shipflare/e2e test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
