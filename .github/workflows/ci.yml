name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev, feat/cf-migration-phase-1]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `wrangler types` writes worker-configuration.d.ts which both apps'
      # tsconfigs depend on. The generated `Cloudflare.Env` includes secret
      # bindings only when `.dev.vars` exists. We also need vitest-pool-workers
      # (which reads the same `.dev.vars`) to find non-empty test-only values
      # — empty secrets break signJwt + AES-GCM key derive.
      # Per-app secret sets — each app's Env declares only the secrets it
      # uses, and `wrangler types` derives Cloudflare.Env from these keys.
      # Adding stray secrets to either side makes Cloudflare.Env wider than
      # our hand-written Env interface and breaks the McpAgent constraint
      # `Env extends Cloudflare.Env` check.
      - name: Seed .dev.vars with test placeholders
        run: |
          cat > apps/core/.dev.vars <<'EOF'
          MCP_JWT_SECRET=ci-test-mcp-jwt-secret-do-not-deploy
          EXTERNAL_MCP_SECRET=ci-test-external-mcp-secret-do-not-deploy
          ANTHROPIC_API_KEY=sk-ci-test-placeholder
          XAI_API_KEY=ci-test-xai-placeholder
          CHANNEL_ENC_KEY=ci-test-aes-gcm-key-base64-padding-32b=
          VAPID_PUBLIC=ci-test-vapid-public-key
          VAPID_PRIVATE=ci-test-vapid-private-key
          VAPID_SUBJECT=mailto:ci@example.com
          EOF
          cat > apps/web/.dev.vars <<'EOF'
          MCP_JWT_SECRET=ci-test-mcp-jwt-secret-do-not-deploy
          EXTERNAL_MCP_SECRET=ci-test-external-mcp-secret-do-not-deploy
          CHANNEL_ENC_KEY=ci-test-aes-gcm-key-base64-padding-32b=
          VAPID_PUBLIC=ci-test-vapid-public-key
          VAPID_PRIVATE=ci-test-vapid-private-key
          VAPID_SUBJECT=mailto:ci@example.com
          BETTER_AUTH_SECRET=ci-test-better-auth-secret
          BETTER_AUTH_URL=http://localhost:3000
          CORE_PUBLIC_URL=http://localhost:8788
          GITHUB_CLIENT_ID=ci-test-github-client-id
          GITHUB_CLIENT_SECRET=ci-test-github-client-secret
          X_CLIENT_ID=ci-test-x-client-id
          X_CLIENT_SECRET=ci-test-x-client-secret
          REDDIT_CLIENT_ID=ci-test-reddit-client-id
          REDDIT_CLIENT_SECRET=ci-test-reddit-client-secret
          EOF

      - name: Generate worker types (apps/core, apps/web)
        run: |
          pnpm --filter @shipflare/core exec wrangler types || true
          pnpm --filter @shipflare/web exec wrangler types || true

      - name: Typecheck packages
        run: |
          pnpm --filter @shipflare/shared typecheck
          pnpm --filter @shipflare/crypto typecheck
          pnpm --filter @shipflare/db typecheck
          pnpm --filter @shipflare/skills typecheck

      - name: Typecheck apps
        run: |
          pnpm --filter @shipflare/core typecheck
          pnpm --filter @shipflare/web typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # vitest-pool-workers reads .dev.vars for binding values — empty secrets
      # break signJwt / AES-GCM keys / Better Auth at runtime. Seed both
      # before tests start. (Mirrors the Typecheck job's seed step.)
      - name: Seed .dev.vars with test placeholders
        run: |
          cat > apps/core/.dev.vars <<'EOF'
          MCP_JWT_SECRET=ci-test-mcp-jwt-secret-do-not-deploy
          EXTERNAL_MCP_SECRET=ci-test-external-mcp-secret-do-not-deploy
          ANTHROPIC_API_KEY=sk-ci-test-placeholder
          XAI_API_KEY=ci-test-xai-placeholder
          CHANNEL_ENC_KEY=ci-test-aes-gcm-key-base64-padding-32b=
          VAPID_PUBLIC=ci-test-vapid-public-key
          VAPID_PRIVATE=ci-test-vapid-private-key
          VAPID_SUBJECT=mailto:ci@example.com
          EOF
          cat > apps/web/.dev.vars <<'EOF'
          MCP_JWT_SECRET=ci-test-mcp-jwt-secret-do-not-deploy
          EXTERNAL_MCP_SECRET=ci-test-external-mcp-secret-do-not-deploy
          CHANNEL_ENC_KEY=ci-test-aes-gcm-key-base64-padding-32b=
          VAPID_PUBLIC=ci-test-vapid-public-key
          VAPID_PRIVATE=ci-test-vapid-private-key
          VAPID_SUBJECT=mailto:ci@example.com
          BETTER_AUTH_SECRET=ci-test-better-auth-secret
          BETTER_AUTH_URL=http://localhost:3000
          CORE_PUBLIC_URL=http://localhost:8788
          GITHUB_CLIENT_ID=ci-test-github-client-id
          GITHUB_CLIENT_SECRET=ci-test-github-client-secret
          X_CLIENT_ID=ci-test-x-client-id
          X_CLIENT_SECRET=ci-test-x-client-secret
          REDDIT_CLIENT_ID=ci-test-reddit-client-id
          REDDIT_CLIENT_SECRET=ci-test-reddit-client-secret
          EOF

      - name: Generate worker types (apps/core, apps/web)
        run: |
          pnpm --filter @shipflare/core exec wrangler types || true
          pnpm --filter @shipflare/web exec wrangler types || true

      - name: Run package tests
        run: |
          pnpm --filter @shipflare/shared test
          pnpm --filter @shipflare/crypto test
          pnpm --filter @shipflare/db test
          pnpm --filter @shipflare/skills test

      - name: Run app tests
        run: |
          pnpm --filter @shipflare/core test
          pnpm --filter @shipflare/web test

  build-web:
    name: Build apps/web (OpenNext)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Seed .dev.vars with test placeholders
        run: |
          cat > apps/web/.dev.vars <<'EOF'
          MCP_JWT_SECRET=ci-test-mcp-jwt-secret-do-not-deploy
          EXTERNAL_MCP_SECRET=ci-test-external-mcp-secret-do-not-deploy
          CHANNEL_ENC_KEY=ci-test-aes-gcm-key-base64-padding-32b=
          VAPID_PUBLIC=ci-test-vapid-public-key
          VAPID_PRIVATE=ci-test-vapid-private-key
          VAPID_SUBJECT=mailto:ci@example.com
          BETTER_AUTH_SECRET=ci-test-better-auth-secret
          BETTER_AUTH_URL=http://localhost:3000
          CORE_PUBLIC_URL=http://localhost:8788
          GITHUB_CLIENT_ID=ci-test-github-client-id
          GITHUB_CLIENT_SECRET=ci-test-github-client-secret
          X_CLIENT_ID=ci-test-x-client-id
          X_CLIENT_SECRET=ci-test-x-client-secret
          REDDIT_CLIENT_ID=ci-test-reddit-client-id
          REDDIT_CLIENT_SECRET=ci-test-reddit-client-secret
          EOF

      - name: Generate worker types (apps/web)
        run: pnpm --filter @shipflare/web exec wrangler types || true

      - name: next build
        run: pnpm --filter @shipflare/web build

      # `opennextjs-cloudflare build` defaults to invoking the project's
      # build script via `bun run build` — bun isn't in the CI runner.
      # We already ran `next build` in the prior step; pass --skipNextBuild
      # so OpenNext only does its post-processing (worker bundling).
      - name: opennextjs-cloudflare build
        run: pnpm --filter @shipflare/web exec opennextjs-cloudflare build --skipNextBuild

  # Deployment is NOT wired into CI. Production deploy is operator-driven via
  # `./scripts/deploy-cf.sh` after the first-deploy checklist
  # (`scripts/cf-deploy-checklist.md`) has been completed once per environment.
