name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shipflare_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/shipflare_test
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: ci-test-secret-minimum-32-chars!!
      GITHUB_ID: fake-github-id
      GITHUB_SECRET: fake-github-secret
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      ANTHROPIC_API_KEY: sk-ant-fake
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test (unit + integration via vitest)
        run: bun run test

      # E2E (Playwright) is intentionally skipped in CI — run locally via the
      # `qa` skill or `bun run test:e2e` before launch. Adding it here would
      # require browser binaries, a running Next.js server, and seeded DB state
      # that belongs in a dedicated e2e workflow, not the fast feedback loop.

      - name: Build
        run: bun run build

  # Deploys web + worker services to Railway on pushes to main (production) or
  # dev (staging). Disabled by default — set the `DEPLOY_ENABLED` repo variable
  # (Settings → Secrets and variables → Actions → Variables) to `true` AND add
  # the `RAILWAY_TOKEN` secret to activate. Remember to turn off Railway's
  # native GitHub auto-deploy once this is live so CI is the only deploy gate.
  deploy:
    name: Deploy to Railway
    needs: verify
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RAILWAY_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy web service
        run: railway up --environment $RAILWAY_ENV --service web
      - name: Deploy worker service
        run: railway up --environment $RAILWAY_ENV --service worker
