name: Sync dev with main

# After every dev→main merge, fast-forward (or merge) main back into
# dev so the next dev→main PR doesn't show "This branch is out-of-date
# with the base branch."
#
# Why workflow_run, not push:
#   The naive `on: push: branches: [main]` runs the sync in PARALLEL
#   with CI. dev's branch protection requires the "Lint, Typecheck,
#   Test, Build" status check on every pushed tip, and at sync time
#   that check is still "queued" on the new main commit — so the push
#   to dev gets rejected (GH006 protected branch hook declined).
#
#   Triggering on workflow_run instead means we run AFTER CI on main
#   completes. By then the status check is recorded on the commit, so
#   when we push that same commit to dev, dev's protection sees a
#   matching passing check and accepts the push.
#
# Strategy:
#   - If dev is an ancestor of main: fast-forward dev to main.
#   - If dev has diverged: merge main into dev (creates a merge commit
#     on dev). Tree delta is normally zero — main's merge commit just
#     records that dev was merged in — so no conflicts in normal flow.
#   - On any conflict, fail loudly and leave dev untouched. The next
#     successful push to main will retry.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Serialize sync runs so back-to-back merges to main don't race.
concurrency:
  group: sync-dev-with-main
  cancel-in-progress: false

jobs:
  sync:
    # Only run when CI on main passed. If CI failed, the merge commit
    # has no passing status — pushing to dev would be rejected anyway,
    # and we don't want to drag a broken main into dev.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: Checkout dev with full history
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch main
        run: git fetch origin main

      - name: Sync dev to main
        run: |
          set -euo pipefail
          if git merge-base --is-ancestor HEAD origin/main; then
            echo "dev is an ancestor of main — fast-forwarding"
            git merge --ff-only origin/main
          else
            echo "dev has diverged from main — merging main into dev"
            if ! git merge --no-ff --no-edit origin/main; then
              echo "::error::Merge conflict syncing main into dev. Resolve manually." >&2
              git merge --abort || true
              exit 1
            fi
          fi

      - name: Push dev
        run: git push origin dev
